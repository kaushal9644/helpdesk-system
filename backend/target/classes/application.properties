spring.application.name=backend

spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/helpdesk?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Multipart upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB

# JWT
app.jwt.secret=${JWT_SECRET:ChangeThisToAVeryLongSecretKeyForHS256AlgorithmMinimum32Chars}
app.jwt.expiration-ms=86400000
app.jwt.issuer=helpdesk-api

# Storage
app.storage.upload-dir=${UPLOAD_DIR:uploads}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
app.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true
app.cors.max-age=3600

# Dev seed users
app.dev.seed-enabled=true